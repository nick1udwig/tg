name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump to apply
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BINARY_NAME: tg
      TARGET_OS: linux
      TARGET_ARCHES: amd64 arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
        run: |
          current_version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${current_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION must contain MAJOR.MINOR.PATCH, found: ${current_version}" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "${BUMP}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${BUMP}" >&2
              exit 1
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          tag="v${new_version}"

          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin" >&2
            exit 1
          fi

          printf '%s\n' "${new_version}" > VERSION

          {
            echo "current=${current_version}"
            echo "version=${new_version}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Commit version bump and tag
        run: |
          git add VERSION
          git commit -m "release: ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"

      - name: Build release artifact
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for arch in ${TARGET_ARCHES}; do
            build_dir="dist/${TARGET_OS}_${arch}"
            asset="${BINARY_NAME}_${{ steps.version.outputs.version }}_${TARGET_OS}_${arch}.tar.gz"
            mkdir -p "${build_dir}"
            GOOS="${TARGET_OS}" GOARCH="${arch}" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
              -o "${build_dir}/${BINARY_NAME}" \
              .
            tar -C "${build_dir}" -czf "dist/${asset}" "${BINARY_NAME}"
          done

      - name: Push commit and tag
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/*.tar.gz \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Release ${{ steps.version.outputs.tag }}"
